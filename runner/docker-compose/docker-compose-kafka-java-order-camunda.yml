services:
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    networks:
      - flowing
    ports:
      - "9092:9092"     # internal/container clients can also use kafka:9092
      - "29092:29092"   # host clients use localhost:29092
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  checkout:
    build:
      context: ../../kafka/java/checkout
      dockerfile: Dockerfile
    networks:
      - flowing
    ports:
      - "8091:8091"
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  order:
    build:
      context: ../../kafka/java/order-camunda
      dockerfile: Dockerfile
    networks:
      - flowing
    ports:
      - "8092:8092"
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  payment:
    build:
      context: ../../kafka/java/payment-camunda
      dockerfile: Dockerfile
    networks:
      - flowing
    ports:
      - "8093:8093"
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  inventory:
    build:
      context: ../../kafka/java/inventory
      dockerfile: Dockerfile
    networks:
      - flowing
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  shipping:
    build:
      context: ../../kafka/java/shipping
      dockerfile: Dockerfile
    networks:
      - flowing
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  monitor:
    build:
      context: ../../kafka/java/monitor
      dockerfile: Dockerfile
    networks:
      - flowing
    ports:
      - "8095:8095"
    depends_on:
      - kafka
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  docs:
    image: flowingretail/docs
    networks:
      - flowing
    ports:
      - "8099:80"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092

networks:
  flowing:
    driver: bridge
